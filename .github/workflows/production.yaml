name: Production Deployment Workflow

on:
  workflow_call:
    secrets:
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false

jobs:
  # Job 1: Commit Lint Check
  call_commitlint:
    name: ⚙️ Commit Lint Check
    uses: ./.github/workflows/commitlint.yaml
    secrets: inherit

  # Job 2: Markdown Lint Check
  call_markdownlint:
    name: 📄 Markdown Lint Check
    uses: ./.github/workflows/markdownlint.yaml
    secrets: inherit
      
  # Job 3: Smoke Tests Check
  call_smoke_tests:
    name: 💨 Run Smoke Tests
    uses: ./.github/workflows/smoke-tests.yaml
    secrets: inherit

  # Job 4: Core Environment Steps
  production_deploy:
    name: Production Deployment Steps
    runs-on: ubuntu-latest 
    needs: [call_commitlint, call_markdownlint, call_smoke_tests]
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Report Successful Production Call
        run: |
          echo "######################################################"
          echo "## PRODUCTION WORKFLOW (master Branch) CALLED!      ##"
          echo "######################################################"
          echo "Final checks complete. Preparing for live deployment."
          
      - name: Placeholder for Production Deployment Steps
        run: |
          echo "Starting production deployment process..."
          echo "Deployment complete."

  # Job 5: Call Release Engine (Production Release)
  call_release_engine:
    name: 🚀 Execute Production Release
    needs: [production_deploy]
    uses: ./.github/workflows/semantic-release.yaml
    with:
      environment: production
    secrets: inherit