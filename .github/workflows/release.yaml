name: Release / Pre-Production CI/CD Workflow

on:
  workflow_call:
    secrets:
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false

jobs:
  # Job 1: Commit Lint Check
  call_commitlint:
    name: ⚙️ Commit Lint Check
    uses: ./.github/workflows/commitlint.yaml
    secrets: inherit

  # Job 2: Markdown Lint Check
  call_markdownlint:
    name: 📄 Markdown Lint Check
    uses: ./.github/workflows/markdownlint.yaml
    secrets: inherit
      
  # Job 3: Smoke Tests Check
  call_smoke_tests:
    name: 💨 Run Smoke Tests
    uses: ./.github/workflows/smoke-tests.yaml
    secrets: inherit

  # Job 4: Core Environment Steps
  release_checks:
    name: Release Final Checks
    runs-on: ubuntu-latest
    needs: [call_commitlint, call_markdownlint, call_smoke_tests]
    environment: release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 📢 Report Successful Release Call
        run: |
          echo "#################################################"
          echo "## RELEASE/PRE-PROD WORKFLOW CALLED!          ##"
          echo "#################################################"
          echo "All linting and smoke tests passed. Running final checks."

      - name: Placeholder for Release Checks
        run: |
          echo "Starting vulnerability and security scan..."
          echo "Creating final release artifact..."

  # Job 5: Call Release Engine (Pre-release / Dry Run)
  call_release_engine:
    name: 🧪 Validate Release Syntax (Pre-release)
    needs: [release_checks]
    uses: ./.github/workflows/semantic-release.yaml
    with:
      environment: release
    secrets: inherit